<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>認証完了 - ちょっと賢くなるクイズ</title>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 80px auto; padding: 20px; text-align: center; }
        .code-box { background: #f0f0f0; padding: 15px; border-radius: 8px; margin: 20px 0; word-break: break-all; font-family: monospace; font-size: 14px; }
        .url-box { background: #e8f5e9; padding: 15px; border-radius: 8px; margin: 20px 0; word-break: break-all; font-family: monospace; font-size: 12px; }
        button { background: #1a1a2e; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-size: 16px; }
        button:hover { background: #16213e; }
    </style>
</head>
<body>
    <h1>認証完了</h1>
    <p>以下のURLをターミナルに貼り付けてください：</p>
    <div class="url-box" id="fullUrl"></div>
    <button onclick="copyUrl()">URLをコピー</button>
    <p id="status"></p>

    <script>
        const fullUrl = window.location.href;
        document.getElementById('fullUrl').textContent = fullUrl;

        function copyUrl() {
            navigator.clipboard.writeText(fullUrl).then(() => {
                document.getElementById('status').textContent = 'コピーしました！ターミナルに貼り付けてください。';
            });
        }
    </script>
</body>
</html>
